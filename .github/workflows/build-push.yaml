name: Build and Push Docker Images

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed-dirs: ${{ steps.changes.outputs.dirs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch full history

      - name: Detect changed Dockerfiles
        id: changes
        run: |
          # If this is the first commit, compare against empty tree
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            BASE="HEAD^"
          else
            BASE=$(git hash-object -t tree /dev/null)
          fi

          CHANGED=$(git diff --name-only $BASE HEAD | grep 'Dockerfile$' | xargs -n1 dirname 2>/dev/null | sort -u | jq -R -s -c 'split("\n")[:-1]')

          # Handle case where no Dockerfiles changed
          if [ -z "$CHANGED" ] || [ "$CHANGED" == '[""]' ]; then
            CHANGED="[]"
          fi

          echo "dirs=${CHANGED}" >> $GITHUB_OUTPUT

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed-dirs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.detect-changes.outputs.changed-dirs) }}
    outputs:
      results: ${{ steps.result.outputs.results }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r --arg dir "${{ matrix.dir }}" '.[$dir] // "0.0.0"' versions.json)
          NEW_VERSION=$(echo $VERSION | awk -F. '{$NF = $NF + 1;} 1' | sed 's/ /./g')
          echo "new=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.dir }}
          push: true
          tags: ghcr.io/tredy-ai/${{ matrix.dir }}:${{ steps.version.outputs.new }}

      - name: Record result
        id: result
        if: always()
        run: |
          mkdir -p results
          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "${{ matrix.dir }}:${{ steps.version.outputs.new }}" > results/${{ matrix.dir }}.txt
          fi

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: result-${{ matrix.dir }}
          path: results/

  update-versions:
    needs: [detect-changes, build-and-push]
    if: always() && needs.detect-changes.outputs.changed-dirs != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true
          path: results/

      - name: Update versions for successful builds
        run: |
          if [ ! -d results ] || [ -z "$(ls -A results)" ]; then
            echo "No successful builds to update"
            exit 0
          fi

          for result_file in results/*.txt; do
            if [ -f "$result_file" ]; then
              DIR_VERSION=$(cat "$result_file")
              DIR=$(echo "$DIR_VERSION" | cut -d: -f1)
              NEW_VERSION=$(echo "$DIR_VERSION" | cut -d: -f2)

              echo "Updating $DIR to $NEW_VERSION"
              jq --arg dir "$DIR" --arg version "$NEW_VERSION" '.[$dir] = $version' versions.json > versions.tmp
              mv versions.tmp versions.json
            fi
          done

      - name: Commit version bumps
        run: |
          if git diff --quiet versions.json; then
            echo "No version changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore: bump versions for changed services [skip ci]"
          git pull --rebase
          git push
